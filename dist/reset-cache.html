<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Réinitialisation Lumina</title>
</head>
<body style="font-family:system-ui;padding:24px;max-width:600px;margin:auto">
  <h1>Chœur Lumina</h1>
  <p>Réinitialisation de l'ancienne version en cours…</p>
  <script>
    (async () => {
      if ("serviceWorker" in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      if ("caches" in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      localStorage.removeItem("lumina_group_draft");
      setTimeout(() => location.replace("/?fresh=" + Date.now()), 800);
    })();
  </script>
</body>
</html>
