name: Build PWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Installer les dépendances
        run: npm install

      - name: Construire la PWA
        run: npm run build

      - name: Publier le build comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: choeur-lumina-pwa
          path: dist/
